version: '3.9'

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 128m

  frontend:
    build:
      context: ./frontend
      target: prod
    restart: always
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 128m

  backend:
    build:
      context: ./backend
      target: prod
    env_file: .env.prod
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - frontend-net
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512m

  db:
    image: mysql:8.0
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  mysql-data:
  redis-data:

networks:
  frontend-net:
  backend-net:
    internal: true

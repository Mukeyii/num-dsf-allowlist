name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Backend audit
        working-directory: backend
        run: |
          npm install
          npm audit --audit-level=high
      - name: Frontend audit
        working-directory: frontend
        run: |
          npm install
          # GHSA-5xrq-8626-4rwp affects only the vitest --ui server, which CI never starts (vitest run only).
          npx better-npm-audit audit --level high -x GHSA-5xrq-8626-4rwp

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx tsc --noEmit
      - run: npx eslint .

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: dsf_allowlist
          MYSQL_USER: dsf
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 3306
      DB_NAME: dsf_allowlist
      DB_USER: dsf
      DB_PASSWORD: testpass
      DB_ROOT_PASSWORD: testroot
      REDIS_URL: redis://localhost:6379
      # 64 hex chars = 32 bytes, required by AES-256-GCM in totp.service.
      TOTP_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      DSF_ENVIRONMENT: TEST
      IMI_ADMIN_EMAILS: admin@test.de
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run database migrations
        run: |
          for f in ../db/migrations/*.sql; do
            echo "Applying $f"
            mysql -h 127.0.0.1 -u root -ptestroot dsf_allowlist < "$f"
          done
      - name: Generate test JWT keys
        run: |
          openssl genrsa 2048 > /tmp/jwt_private.pem
          openssl rsa -in /tmp/jwt_private.pem -pubout > /tmp/jwt_public.pem
          echo "JWT_PRIVATE_KEY_BASE64=$(base64 -w0 /tmp/jwt_private.pem)" >> $GITHUB_ENV
          echo "JWT_PUBLIC_KEY_BASE64=$(base64 -w0 /tmp/jwt_public.pem)" >> $GITHUB_ENV
      - run: npm test

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx tsc --noEmit
      - run: npx eslint .

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  frontend-e2e:
    needs: frontend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup .env from example
        run: |
          cp .env.example .env || true
          grep -q "DEV_AUTO_LOGIN=true" .env || echo "DEV_AUTO_LOGIN=true" >> .env
          grep -q "DEV_TOTP_BYPASS=true" .env || echo "DEV_TOTP_BYPASS=true" >> .env
          # backend/src/index.ts hard-aborts when DEV_TOTP_BYPASS=true unless
          # NODE_ENV=development AND HOST is localhost. CI satisfies both.
          grep -q "^NODE_ENV=" .env || echo "NODE_ENV=development" >> .env
          grep -q "^HOST=" .env || echo "HOST=127.0.0.1" >> .env
          sed -i 's|^IMI_ADMIN_EMAILS=.*|IMI_ADMIN_EMAILS=admin@imi-test.example.de|' .env
      - name: Generate dev keys
        run: |
          if [ -f scripts/generate-keys.sh ]; then bash scripts/generate-keys.sh; fi
      - name: Install frontend deps
        working-directory: frontend
        run: npm install
      - name: Generate TLS certs
        run: |
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
            -keyout certs/server.key -out certs/server.crt \
            -subj "/CN=localhost" 2>/dev/null
          cp certs/server.crt certs/client-ca.crt
      - name: Disable nginx rate limits for CI
        run: sed -i '/limit_req/d' nginx/nginx.conf
      - name: Start docker stack
        run: docker compose up -d --wait
      - name: Apply migrations
        run: |
          DB_PW=$(grep ^DB_PASSWORD .env | cut -d= -f2)
          for f in db/migrations/*.sql; do
            docker compose exec -T db mysql -udsf -p"$DB_PW" dsf_allowlist < "$f" 2>&1 | tail -1 || true
          done
      - name: Seed
        run: docker compose exec -T backend npx ts-node src/db/seed-testdata.ts
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        working-directory: frontend
        run: npm run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: |
            frontend/test-results/
            frontend/playwright-report/

  frontend-contract:
    needs: frontend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup .env from example
        run: |
          cp .env.example .env || true
          grep -q "DEV_AUTO_LOGIN=true" .env || echo "DEV_AUTO_LOGIN=true" >> .env
          grep -q "DEV_TOTP_BYPASS=true" .env || echo "DEV_TOTP_BYPASS=true" >> .env
          # backend/src/index.ts hard-aborts when DEV_TOTP_BYPASS=true unless
          # NODE_ENV=development AND HOST is localhost. CI satisfies both.
          grep -q "^NODE_ENV=" .env || echo "NODE_ENV=development" >> .env
          grep -q "^HOST=" .env || echo "HOST=127.0.0.1" >> .env
          sed -i 's|^IMI_ADMIN_EMAILS=.*|IMI_ADMIN_EMAILS=admin@imi-test.example.de|' .env
      - name: Generate dev keys
        run: |
          if [ -f scripts/generate-keys.sh ]; then bash scripts/generate-keys.sh; fi
      - name: Install frontend deps
        working-directory: frontend
        run: npm install
      - name: Generate TLS certs
        run: |
          mkdir -p certs
          openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
            -keyout certs/server.key -out certs/server.crt \
            -subj "/CN=localhost" 2>/dev/null
          cp certs/server.crt certs/client-ca.crt
      - name: Disable nginx rate limits for CI
        run: sed -i '/limit_req/d' nginx/nginx.conf
      - name: Start docker stack
        run: docker compose up -d --wait
      - name: Apply migrations
        run: |
          DB_PW=$(grep ^DB_PASSWORD .env | cut -d= -f2)
          for f in db/migrations/*.sql; do
            docker compose exec -T db mysql -udsf -p"$DB_PW" dsf_allowlist < "$f" 2>&1 | tail -1 || true
          done
      - name: Seed
        run: docker compose exec -T backend npx ts-node src/db/seed-testdata.ts
      - name: Run contract suite
        working-directory: frontend
        env:
          CONTRACT_BASE_URL: http://localhost
        run: npm run test:contract

  frontend-bundle:
    needs: frontend-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx vite build
      - run: npx bundlesize --config .bundlesize.json

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx prettier --check .

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - backend-lint
      - frontend-test
      - frontend-lint
      - frontend-e2e
      - frontend-contract
      - frontend-bundle
      - security-audit
      - format
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker compose -f docker-compose.prod.yml build --no-cache
      - name: Verify images
        run: |
          docker images | grep dsf-allowlist

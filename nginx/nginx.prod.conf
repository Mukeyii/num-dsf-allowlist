events {
  worker_connections 2048;
}

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;
  charset utf-8;

  log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent "$http_user_agent"';
  access_log /var/log/nginx/access.log main buffer=16k flush=5s;
  error_log /var/log/nginx/error.log warn;

  limit_req_zone $binary_remote_addr zone=auth_zone:20m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=api_zone:50m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=static_zone:10m rate=200r/m;
  limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

  upstream backend { server backend:3000; keepalive 32; }
  upstream frontend { server frontend:80; keepalive 16; }

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    limit_conn conn_zone 20;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    location /auth/ {
      limit_req zone=auth_zone burst=5 nodelay;
      limit_req_status 429;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      client_max_body_size 10k;
    }

    location /api/ {
      limit_req zone=api_zone burst=30 nodelay;
      limit_req_status 429;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      client_max_body_size 5m;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    location / {
      limit_req zone=static_zone burst=50 nodelay;
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_intercept_errors on;
      error_page 404 = /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2|woff|ttf)$ {
      proxy_pass http://frontend;
      expires 1y;
      add_header Cache-Control "public, immutable";
      add_header X-Content-Type-Options "nosniff" always;
    }

    location /health {
      proxy_pass http://backend;
      access_log off;
    }

    location ~ /\. { deny all; access_log off; log_not_found off; }
  }
}

version: '3.9'

services:
  nginx:
    build: ./nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # In dev, ts-node-dev compiles TS on the fly — the container can be
    # `Started` long before the HTTP listener accepts traffic. CI's
    # `docker compose up -d --wait` blocks on healthchecks only, so add
    # one that probes the backend's own /health/live endpoint. start_period
    # gives ts-node-dev a generous window to spin up before the probe
    # starts counting failures.
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health/live || exit 1']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  db:
    image: mysql:8.0
    platform: linux/amd64
    # log-bin-trust-function-creators allows non-SUPER users (the `dsf`
    # account) to apply migrations that create TRIGGERs (migrations 013 and
    # 015). Without this CI runs migrations as `dsf` and fails with
    # ERROR 1419 'You do not have the SUPER privilege and binary logging is
    # enabled' because the default mysql:8.0 image enables binary logging.
    command:
      - --log-bin-trust-function-creators=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-p${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mail:
    image: mailhog/mailhog:v1.0.1
    ports:
      - '127.0.0.1:8025:8025'
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
